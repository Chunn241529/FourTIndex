# Cấu hình fourTindex
project:
  name: "FourTIndex"
  exclude_dirs:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "__pycache__"
    - ".venv"
    - "venv"
    - ".agents"
    - ".gemini"
    - ".fourtindex"
    - "fourtindex.egg-info"
  supported_extensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".jsx"
    - ".tsx"
    - ".json"
    - ".md"
    - ".txt"
    - ".rs"
    - ".go"
    - ".java"
    - ".kt"
    - ".swift"
    - ".cs"
    - ".cpp"
    - ".h"
    - ".gd"
    - ".lua"

database:
  persist_directory: "./.fourtindex/db"

provider: "lmstudio"

ollama:
  host: "http://localhost:11434"
  embedding_model: "monas-embeddings-code"
  llm_model: "monas"

lmstudio:
  host: "http://127.0.0.1:2401"
  llm_model: "monas"
  embedding_model: "monas-embeddings-code"
  api_token: ""
  large_model_threshold_bytes: 2147483648

local:
  embedding_model: "monas-embeddings-code"

embedding:
  batch_size: 0
  batch_max_chars: 500000
  retry_attempts: 2

indexing:
  parse_workers: 0
  commit_batch_files: 0
  max_file_size_bytes: 2097152
  respect_gitignore: true
  exclude_globs: []

rerank:
  enabled: true
  model: "monas-reranker"
  candidates_limit: 15
