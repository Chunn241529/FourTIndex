# Cấu hình fourTindex
project:
  name: "FourTIndex"
  exclude_dirs:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "__pycache__"
    - ".venv"
    - "venv"
    - ".agents"
    - ".gemini"
    - ".fourtindex"
    - "fourtindex.egg-info"
  supported_extensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".jsx"
    - ".tsx"
    - ".json"
    - ".md"
    - ".txt"

database:
  persist_directory: "./.fourtindex/db"

ollama:
  host: "http://localhost:11434"
  embedding_model: "qwen3-embedding:0.6b"
  llm_model: "qwen2.5-coder:7b"

embedding:
  provider_chain:
    - "ollama"
  batch_size: 64
  batch_max_chars: 250000
  retry_attempts: 2
  request_timeout_seconds: 60

indexing:
  parse_workers: 0
  commit_batch_files: 32
  max_file_size_bytes: 2097152
  respect_gitignore: true
  exclude_globs: []
