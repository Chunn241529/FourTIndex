# Cấu hình fourTindex
project:
  name: "fourTindex"
  exclude_dirs:
    - ".git"
    - "node_modules"
    - "dist"
    - "build"
    - "__pycache__"
    - ".venv"
    - "venv"
    - ".agents"
    - ".gemini"
    - ".fourtindex"
    - "fourtindex.egg-info"
  supported_extensions:
    - ".py"
    - ".js"
    - ".ts"
    - ".jsx"
    - ".tsx"
    - ".json"
    - ".md"
    - ".txt"

database:
  persist_directory: "./.fourtindex/db"

ollama:
  host: "http://localhost:11434"
  embedding_model: "qwen3-embedding:4b"
  llm_model: "qwen2.5-coder:7b"
